<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker Pro - Precise Input</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">⏱️ Time Tracker</h1>
                <p class="text-slate-500 text-sm mt-1">입력도 확인도 '시간+분'으로 더 편리하게.</p>
            </div>
            <div class="bg-white shadow-sm border border-slate-200 p-2 rounded-2xl flex items-center gap-3">
                <span class="pl-3 text-sm font-bold text-slate-400">날짜 선택</span>
                <input type="date" id="currentDate" class="outline-none bg-slate-100 p-2 rounded-xl text-slate-700 font-semibold cursor-pointer">
            </div>
        </header>

        <section class="bg-white p-2 rounded-2xl shadow-xl shadow-slate-200/50 mb-10 flex items-center border border-slate-100">
            <input type="text" id="newCategoryInput" placeholder="새로운 관리 항목을 입력하세요 (예: 업무, 공부)" 
                   class="flex-1 p-4 rounded-xl outline-none text-slate-700 placeholder:text-slate-300">
            <button onclick="addNewCategory()" 
                    class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all active:scale-95 shadow-lg shadow-indigo-200">
                항목 추가
            </button>
        </section>

        <div id="categoryList" class="grid gap-4 mb-12"></div>

        <hr class="border-slate-200 mb-12">

        <h2 class="text-xl font-extrabold text-slate-800 mb-6 flex items-center gap-2">
            <span class="w-2 h-6 bg-indigo-600 rounded-full"></span> 누적 데이터 분석
        </h2>
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">최근 7일</h3>
                <div id="stat-7" class="space-y-3 min-h-[80px]"></div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">최근 30일</h3>
                <div id="stat-30" class="space-y-3 min-h-[80px]"></div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">최근 90일</h3>
                <div id="stat-90" class="space-y-3 min-h-[80px]"></div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">최근 365일</h3>
                <div id="stat-365" class="space-y-3 min-h-[80px]"></div>
            </div>
        </section>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('timeTrackerV4')) || { categories: [], logs: [] };
        let activeTimers = {};

        const datePicker = document.getElementById('currentDate');
        datePicker.valueAsDate = new Date();

        window.onload = renderAll;

        // 시간 변환 유틸리티
        function formatTime(totalMinutes) {
            const h = Math.floor(totalMinutes / 60);
            const m = Math.round(totalMinutes % 60);
            if (h > 0) return `${h}<span class="text-sm font-normal text-slate-400 mx-0.5">h</span> ${m}<span class="text-sm font-normal text-slate-400 mx-0.5">m</span>`;
            return `${m}<span class="text-sm font-normal text-slate-400 mx-0.5">m</span>`;
        }

        function addNewCategory() {
            const input = document.getElementById('newCategoryInput');
            const name = input.value.trim();
            if (!name || db.categories.includes(name)) return;
            db.categories.push(name);
            saveData();
            input.value = '';
            renderAll();
        }

        // 수동 입력 합산 함수
        function handleManualAdd(category) {
            const hInput = document.getElementById(`h-input-${category}`);
            const mInput = document.getElementById(`m-input-${category}`);
            
            const hours = parseFloat(hInput.value) || 0;
            const minutes = parseFloat(mInput.value) || 0;
            const totalMins = (hours * 60) + minutes;

            if (totalMins > 0) {
                addTime(category, totalMins);
                hInput.value = '';
                mInput.value = '';
            }
        }

        function addTime(category, minutes) {
            const date = datePicker.value;
            const mins = parseFloat(minutes);
            if (isNaN(mins) || mins === 0) return;

            const logIndex = db.logs.findIndex(l => l.date === date && l.category === category);
            if (logIndex > -1) {
                db.logs[logIndex].minutes = Math.max(0, db.logs[logIndex].minutes + mins);
            } else {
                db.logs.push({ date, category, minutes: mins });
            }
            saveData();
            renderAll();
        }

        function toggleTimer(category) {
            const btn = document.getElementById(`timer-btn-${category}`);
            if (activeTimers[category]) {
                clearInterval(activeTimers[category].interval);
                const elapsedMins = (Date.now() - activeTimers[category].start) / 1000 / 60;
                addTime(category, elapsedMins);
                delete activeTimers[category];
            } else {
                activeTimers[category] = {
                    start: Date.now(),
                    interval: setInterval(() => {
                        const diff = Math.floor((Date.now() - activeTimers[category].start) / 1000);
                        const h = Math.floor(diff / 3600);
                        const m = Math.floor((diff % 3600) / 60);
                        const s = diff % 60;
                        document.getElementById(`display-${category}`).textContent = 
                            `기록 중: ${h > 0 ? h+'h ' : ''}${m}m ${s}s`;
                    }, 1000)
                };
            }
            renderAll();
        }

        function deleteCategory(name) {
            if (!confirm(`'${name}' 기록을 삭제하시겠습니까?`)) return;
            db.categories = db.categories.filter(c => c !== name);
            db.logs = db.logs.filter(l => l.category !== name);
            saveData();
            renderAll();
        }

        function renderList() {
            const list = document.getElementById('categoryList');
            const selectedDate = datePicker.value;
            list.innerHTML = '';

            db.categories.forEach(cat => {
                const log = db.logs.find(l => l.date === selectedDate && l.category === cat);
                const totalMins = log ? log.minutes : 0;
                const isRunning = !!activeTimers[cat];

                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap items-center justify-between gap-6";
                card.innerHTML = `
                    <div class="flex-1 min-w-[200px]">
                        <div class="flex items-center gap-3 mb-1">
                            <h3 class="font-bold text-slate-700 text-lg">${cat}</h3>
                            <span id="display-${cat}" class="text-xs font-semibold text-indigo-500 font-mono italic">
                                ${isRunning ? '진행중...' : ''}
                            </span>
                        </div>
                        <div class="text-4xl font-black text-slate-900 leading-none tabular-nums">
                            ${formatTime(totalMins)}
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-4">
                        <button id="timer-btn-${cat}" onclick="toggleTimer('${cat}')" 
                                class="${isRunning ? 'bg-red-500 hover:bg-red-600' : 'bg-emerald-500 hover:bg-emerald-600'} text-white px-5 py-4 rounded-xl font-bold text-sm min-w-[90px] transition-colors shadow-md">
                            ${isRunning ? '⏹️ 중지' : '▶️ 시작'}
                        </button>

                        <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 p-2 rounded-xl">
                            <div class="flex items-center gap-1">
                                <input type="number" id="h-input-${cat}" placeholder="0" class="w-10 bg-white border border-slate-200 rounded-md text-center font-bold text-slate-700 p-1 outline-none focus:ring-2 focus:ring-indigo-300">
                                <span class="text-xs font-bold text-slate-400">h</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <input type="number" id="m-input-${cat}" placeholder="0" class="w-10 bg-white border border-slate-200 rounded-md text-center font-bold text-slate-700 p-1 outline-none focus:ring-2 focus:ring-indigo-300">
                                <span class="text-xs font-bold text-slate-400">m</span>
                            </div>
                            <button onclick="handleManualAdd('${cat}')" 
                                    class="ml-1 bg-white text-indigo-600 border border-indigo-100 px-3 py-1 rounded-lg text-xs font-extrabold hover:bg-indigo-50 transition-all">
                                추가
                            </button>
                        </div>

                        <button onclick="deleteCategory('${cat}')" class="text-slate-300 hover:text-red-400 transition-colors p-2 text-xl">✕</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function renderStats() {
            const periods = [7, 30, 90, 365];
            const now = new Date();

            periods.forEach(p => {
                const container = document.getElementById(`stat-${p}`);
                const summary = {};
                const cutoff = new Date();
                cutoff.setDate(now.getDate() - p);

                db.logs.forEach(log => {
                    if (new Date(log.date) >= cutoff) {
                        summary[log.category] = (summary[log.category] || 0) + log.minutes;
                    }
                });

                const sorted = Object.entries(summary).sort((a, b) => b[1] - a[1]);
                container.innerHTML = sorted.map(([name, val]) => `
                    <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                        <span class="text-sm font-medium text-slate-600 truncate mr-2">${name}</span>
                        <span class="text-sm font-mono font-bold text-indigo-600 shrink-0">${formatTime(val)}</span>
                    </div>
                `).join('') || '<div class="text-slate-300 text-xs italic py-4 text-center">No data</div>';
            });
        }

        function saveData() { localStorage.setItem('timeTrackerV4', JSON.stringify(db)); }
        function renderAll() { renderList(); renderStats(); }
        datePicker.addEventListener('change', renderAll);
    </script>
</body>
</html>
